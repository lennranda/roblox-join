<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Join Roblox Server</title>
  <style>
    body{font-family:Arial;background:#111;color:white;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .box{background:#1b1b1b;padding:25px;border-radius:12px;width:420px;text-align:center}
    button{padding:12px 18px;border:0;border-radius:8px;cursor:pointer;font-weight:bold}
    code{word-break:break-all;color:#7cff7c}
  </style>
</head>
<body>
  <div class="box">
    <h2>Entrando no servidor...</h2>
    <p>PlaceId:</p>
    <code id="place"></code>
    <p>JobId:</p>
    <code id="job"></code>
    <br><br>
    <button onclick="join()">Abrir Roblox</button>
  </div>

  <script>
    const q = new URLSearchParams(location.search)
    const placeId = q.get("placeId") || "97598239454123"
    const jobId = q.get("jobId") || q.get("job") || ""

    document.getElementById("place").textContent = placeId
    document.getElementById("job").textContent = jobId || "N/A"

    function join(){
      if(!jobId){
        alert("JobId faltando na URL")
        return
      }

      location.href = `roblox://experiences/start?placeId=${encodeURIComponent(placeId)}&gameInstanceId=${encodeURIComponent(jobId)}`
    }

    setTimeout(join, 500)
  </script>
</body>
</html>
