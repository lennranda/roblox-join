<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title></title>
  <script>
    const q = new URLSearchParams(location.search)
    const placeId = q.get("placeId") || "97598239454123"
    const jobId = q.get("jobId") || q.get("job") || ""

    if (jobId) {
      location.replace(`roblox://experiences/start?placeId=${encodeURIComponent(placeId)}&gameInstanceId=${encodeURIComponent(jobId)}`)
    } else {
      location.replace(`roblox://experiences/start?placeId=${encodeURIComponent(placeId)}`)
    }
  </script>
</head>
<body></body>
</html>
